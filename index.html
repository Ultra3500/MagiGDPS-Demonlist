<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagiGDPS Demonlist</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff6b00;
            --muted-color: #aaaaaa;
            --border-color: #333333;
            --card-bg: #252525;
            --hover-bg: #2d2d2d;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f4;
            --container-bg: #ffffff;
            --text-color: #222222;
            --accent-color: #e65c00;
            --muted-color: #666666;
            --border-color: #dddddd;
            --card-bg: #eaeaea;
            --hover-bg: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Top Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--container-bg);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .main-tabs {
            display: flex;
            gap: 10px;
        }

        .main-tab-btn {
            background: none;
            border: none;
            color: var(--muted-color);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .main-tab-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        button.ui-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        button.ui-btn:hover {
            background-color: var(--hover-bg);
        }

        /* Main Workspace Content Containers */
        .content-area {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Split Screen for Demonlist */
        .split-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 25px;
            height: calc(100vh - 140px);
        }

        /* Left Side List Area */
        .list-panel {
            display: flex;
            flex-direction: column;
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .list-header {
            padding: 15px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .sub-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .sub-tab-btn {
            background: none;
            border: none;
            color: var(--muted-color);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
        }

        .sub-tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            font-size: 14px;
        }

        .scrollable-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, background-color 0.15s;
        }

        .list-item:hover {
            background-color: var(--hover-bg);
        }

        .list-item.selected {
            border-color: var(--accent-color);
            background-color: var(--hover-bg);
        }

        .item-rank {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-color);
            width: 45px;
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }

        /* Right Side View Area */
        .showcase-panel {
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .no-video-placeholder {
            width: 100%;
            height: 250px;
            background-color: var(--card-bg);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--muted-color);
            font-weight: 500;
            margin-bottom: 25px;
        }

        .level-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .level-main-info h2 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 5px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--muted-color);
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .stat-value.points-val {
            color: var(--accent-color);
        }

        /* Leaderboard Table View */
        .leaderboard-panel {
            background-color: var(--container-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 30px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-table th {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--muted-color);
            font-weight: 600;
        }

        /* Auth Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 6px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        .modal-content h2 {
            margin: 0 0 20px 0;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .switch-auth {
            font-size: 13px;
            color: var(--muted-color);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }
    </style>
</head>
<body data-theme="dark">

    <!-- Top Navigation Bar -->
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 30px;">
            <h1>MagiGDPS Demonlist</h1>
            <div class="main-tabs">
                <button class="main-tab-btn active" onclick="switchMainTab('list-tab-content')">Demonlist</button>
                <button class="main-tab-btn" onclick="switchMainTab('leaderboard-tab-content')">Leaderboard</button>
            </div>
        </div>
        <div class="nav-controls">
            <button class="ui-btn" id="theme-toggle">Light Mode</button>
            <div id="auth-status-container">
                <button class="ui-btn" id="login-btn">Login / Register</button>
                <span id="user-display" style="display: none; margin-right: 12px; font-weight: 600; font-size: 14px;"></span>
                <button class="ui-btn" id="logout-btn" style="display: none;">Logout</button>
            </div>
        </div>
    </div>

    <div class="content-area">
        
        <!-- Tab 1: Demonlist Layout System -->
        <div id="list-tab-content" class="tab-content active">
            <div class="split-layout">
                
                <!-- Left panel lists out all matching records -->
                <div class="list-panel">
                    <div class="list-header">
                        <div class="sub-tabs">
                            <button class="sub-tab-btn active" id="btn-classic" onclick="setListMode('classic')">Classic</button>
                            <button class="sub-tab-btn" id="btn-platformer" onclick="setListMode('platformer')">Platformer</button>
                        </div>
                        <div class="search-box">
                            <input type="text" id="list-search" placeholder="Search levels...">
                        </div>
                    </div>
                    <div class="scrollable-list" id="levels-list-container">
                        <!-- Populated by engine -->
                    </div>
                </div>

                <!-- Right panel presents clean video showcase -->
                <div class="showcase-panel" id="showcase-view-panel">
                    <!-- Loaded dynamically context maps here -->
                </div>

            </div>
        </div>

        <!-- Tab 2: Global Stats Leaderboard -->
        <div id="leaderboard-tab-content" class="tab-content">
            <div class="leaderboard-panel">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Rank</th>
                            <th>Player</th>
                            <th style="text-align: right;">Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-container">
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--muted-color);">Loading dynamic placements...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Login/Register Overlay -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Login</h2>
            <form id="auth-form">
                <div class="form-group" id="username-group" style="display: none;">
                    <label for="auth-username">GDPS Username</label>
                    <input type="text" id="auth-username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required autocomplete="current-password">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px;">
                    <button type="button" id="toggle-auth-type" class="switch-auth">Don't have an account? Register</button>
                    <div class="modal-actions">
                        <button type="button" id="close-modal-btn">Cancel</button>
                        <button type="submit" id="submit-auth-btn" class="ui-btn">Sign In</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK Configurations Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATvFpB9993bf4AgRSbQnd90o9DGYTSswk",
            authDomain: "magigdps-demonlist.firebaseapp.com",
            projectId: "magigdps-demonlist",
            storageBucket: "magigdps-demonlist.firebasestorage.app",
            messagingSenderId: "547008874388",
            appId: "1:547008874388:web:57b74316d3de2c640cb181",
            measurementId: "G-BCSHBW1HX6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // All video URLs have been accurately mapped or marked null for fallbacks
        const classicDemons = [
            { rank: 1, name: "THE HELL ABYSS", publisher: "UltraGamer3500", verifier: "UltraGamer3500", points: 0, video: "https://www.youtube-nocookie.com/embed/I1nONp__jb0" },
            { rank: 2, name: "ISOLATION", publisher: "UltraGamer3500", verifier: "UltraGamer3500", points: 0, video: "https://www.youtube-nocookie.com/embed/3TyKX97t00E" },
            { rank: 3, name: "Sparkler", publisher: "NevisMevis", verifier: "NevisMevis", points: 0, video: null },
            { rank: 4, name: "Silent Shade", publisher: "UltraGamer3500", verifier: "UltraGamer3500", points: 0, video: null },
            { rank: 5, name: "Super Clubstep", publisher: "PolarRice", verifier: "PolarRice", points: 0, video: null }
        ];

        const platformerDemons = [
            { rank: 1, name: "Code M", publisher: "UltraGamer3500", verifier: "UltraGamer3500", points: 0, video: "https://www.youtube-nocookie.com/embed/9bOflrj5CUE" },
            { rank: 2, name: "Only Up", publisher: "UltraGamer3500", verifier: "UltraGamer3500", points: 0, video: null },
            { rank: 3, name: "The Five", publisher: "NevisMevis", verifier: "NevisMevis", points: 0, video: "https://www.youtube-nocookie.com/embed/yIi1zT0yxoU" }
        ];

        let currentMode = 'classic';
        let selectedLevel = null;
        let searchQuery = '';

        // --- APP WORKSPACE LOGIC CONTROLLERS ---
        window.switchMainTab = function(tabContentId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.main-tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabContentId).classList.add('active');
            
            const targetedBtnText = tabContentId === 'list-tab-content' ? 'Demonlist' : 'Leaderboard';
            const targetedBtn = Array.from(document.querySelectorAll('.main-tab-btn')).find(btn => btn.textContent === targetedBtnText);
            if (targetedBtn) targetedBtn.classList.add('active');
        };

        window.setListMode = function(mode) {
            currentMode = mode;
            document.getElementById('btn-classic').classList.toggle('active', mode === 'classic');
            document.getElementById('btn-platformer').classList.toggle('active', mode === 'platformer');
            
            const workingDataset = currentMode === 'classic' ? classicDemons : platformerDemons;
            selectedLevel = workingDataset[0] || null;
            
            renderFilteredList();
            renderShowcaseView();
        };

        function renderFilteredList() {
            const container = document.getElementById('levels-list-container');
            container.innerHTML = '';
            
            const currentArray = currentMode === 'classic' ? classicDemons : platformerDemons;
            const filtered = currentArray.filter(lvl => lvl.name.toLowerCase().includes(searchQuery.toLowerCase()));

            filtered.forEach(lvl => {
                const div = document.createElement('div');
                const isSelected = selectedLevel && selectedLevel.name === lvl.name && selectedLevel.rank === lvl.rank;
                div.className = `list-item ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="item-rank">#${lvl.rank}</div>
                    <div>
                        <div class="item-name">${lvl.name}</div>
                    </div>
                `;
                div.addEventListener('click', () => {
                    selectedLevel = lvl;
                    renderFilteredList();
                    renderShowcaseView();
                });
                container.appendChild(div);
            });
        }

        function renderShowcaseView() {
            const panel = document.getElementById('showcase-view-panel');
            if (!selectedLevel) {
                panel.innerHTML = `<p style="color: var(--muted-color); text-align:center; margin-top:50px;">No levels found.</p>`;
                return;
            }

            // Checks if a video link is present, otherwise swaps out the player for a placeholder string block
            const mediaBlock = selectedLevel.video 
                ? `<div class="video-wrapper">
                       <iframe src="${selectedLevel.video}" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                   </div>`
                : `<div class="no-video-placeholder">No video available for this level</div>`;

            panel.innerHTML = `
                <div class="level-title-row">
                    <div class="level-main-info">
                        <h2>${selectedLevel.name}</h2>
                    </div>
                </div>
                ${mediaBlock}
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">List Points</div>
                        <div class="stat-value points-val">${selectedLevel.points}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Published by</div>
                        <div class="stat-value">${selectedLevel.publisher}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Verified by</div>
                        <div class="stat-value">${selectedLevel.verifier}</div>
                    </div>
                </div>
            `;
        }

        document.getElementById('list-search').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderFilteredList();
        });

        // Initialize state viewports
        setListMode('classic');

        // --- THEME SWAP IMPLEMENTATION ---
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.textContent = isDark ? 'Dark Mode' : 'Light Mode';
        });

        // --- USER ACCOUNT ACCESS HANDLING (FIREBASE AUTH) ---
        const authModal = document.getElementById('auth-modal');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplay = document.getElementById('user-display');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const authForm = document.getElementById('auth-form');
        const toggleAuthTypeBtn = document.getElementById('toggle-auth-type');
        const modalTitle = document.getElementById('modal-title');
        const submitAuthBtn = document.getElementById('submit-auth-btn');
        const usernameGroup = document.getElementById('username-group');

        let isLoginMode = true;

        loginBtn.addEventListener('click', () => authModal.style.display = 'flex');
        closeModalBtn.addEventListener('click', () => authModal.style.display = 'none');

        toggleAuthTypeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                modalTitle.textContent = 'Login';
                submitAuthBtn.textContent = 'Sign In';
                toggleAuthTypeBtn.textContent = "Don't have an account? Register";
                usernameGroup.style.display = 'none';
                document.getElementById('auth-username').removeAttribute('required');
            } else {
                modalTitle.textContent = 'Register Account';
                submitAuthBtn.textContent = 'Create Account';
                toggleAuthTypeBtn.textContent = "Already have an account? Login";
                usernameGroup.style.display = 'block';
                document.getElementById('auth-username').setAttribute('required', 'true');
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value.trim();

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    await updateProfile(user, { displayName: username });
                    await setDoc(doc(db, "players", user.uid), {
                        username: username,
                        points: 0
                    });
                }
                authForm.reset();
                authModal.style.display = 'none';
            } catch (error) {
                alert(error.message);
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userDisplay.style.display = 'inline';
                logoutBtn.style.display = 'inline';
                userDisplay.textContent = user.displayName || user.email;
            } else {
                loginBtn.style.display = 'inline';
                userDisplay.style.display = 'none';
                logoutBtn.style.display = 'none';
                userDisplay.textContent = '';
            }
        });

        // --- DYNAMIC DATABASE LEADERBOARD SYNC (FIRESTORE) ---
        const leaderboardContainer = document.getElementById('leaderboard-container');
        const leaderboardQuery = query(collection(db, "players"), orderBy("points", "desc"), limit(50));

        onSnapshot(leaderboardQuery, (snapshot) => {
            leaderboardContainer.innerHTML = '';
            if (snapshot.empty) {
                leaderboardContainer.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--muted-color); padding: 24px;">No placement records found. Keep climbing!</td></tr>`;
                return;
            }

            let currentRank = 1;
            snapshot.forEach((doc) => {
                const playerData = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600; color: var(--muted-color);">#${currentRank}</td>
                    <td style="font-weight: 500;">${playerData.username || "Anonymous Player"}</td>
                    <td style="text-align: right; font-weight: 600;">${playerData.points || 0}</td>
                `;
                leaderboardContainer.appendChild(tr);
                currentRank++;
            });
        }, (error) => {
            console.error("Leaderboard loading error: ", error);
            leaderboardContainer.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red; padding: 24px;">Error syncing live profiles. Check your database settings.</td></tr>`;
        });
    </script>
</body>
</html>
